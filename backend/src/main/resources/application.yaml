spring:
  application:
    name: HR_Assistant_Chatbot

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  ai:
    ollama:
      base-url: http://localhost:11434

      chat:
        options:
          model: gemma3:4b
          temperature: 0.4

      embedding:
        options:
          model: mxbai-embed-large

    vectorstore:
      pgvector:
        initialize-schema: true   # ✅ FIXED (spaces, not tab)
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 1024
        max-document-batch-size: 10

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

logging:
  level:
    org.springframework.ai: DEBUG